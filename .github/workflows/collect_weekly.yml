name: collect-main-weekly

on:
  schedule:
    - cron: "30 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main weekly collector
        env:
          PIXIV_ACCOUNTS_JSON: ${{ secrets.PIXIV_ACCOUNTS_JSON }}
          DB_PATH: data/pixiv_stats.db
          SNAPSHOT_MAX_AGE_DAYS: "60"
          USER_ILLUSTS_MAX_PAGES: "3"
          MAX_DETAILS_PER_ACCOUNT: "200"
          API_MIN_INTERVAL_SEC: "1.0"
          API_JITTER_SEC: "0.3"
          TZ: UTC
        run: python collect.py --mode daily --account-id main

      - name: Commit DB changes
        run: |
          if git diff --quiet -- data/pixiv_stats.db; then
            echo "No DB changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pixiv_stats.db
          git commit -m "chore(data): update pixiv stats db (weekly)"
          git push
